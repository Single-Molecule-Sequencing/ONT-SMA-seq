# ont-sma-seq run configuration
# Used by: ont-sma run [-c config.yml]
#
# All paths can be absolute or relative to the working directory.

exp_id:      "FAL12345_20260129-IF_SMA"   # FlowCellID_SampleID_Alias
bam:         "path/to/reads.bam"          # Raw uBAM (filename encodes metadata)
pod5_dir:    "path/to/pod5/"              # Raw Pod5 directory
ref:         "path/to/target.fa"          # Single-sequence reference FASTA

outdir:      "Output"                     # Directory for DB output
summary_tsv: "Output/summary.tsv"         # Intermediate: pod5 end-reason metadata

# Optional: read length filter (multipliers of tgt_reflen). Reads outside
# [tgt_reflen * len_min_mult, tgt_reflen * len_max_mult] are skipped before alignment.
# Defaults: 0.5 (50%) and 2.0 (200%). Set to 0.0 / very large to disable.
#len_min_mult: 0.5
#len_max_mult: 2.0
